<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #e5e7eb;
            color: #1f2937;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 1rem;
        }
        .card {
            background-color: #fcfcfc;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .logo-container {
            background-color: #fcfcfc;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }
        #logo-img {
            height: 40px;
        }
        .title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 1rem;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        #company-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff5a96;
            margin-left: 1rem;
        }
        .form-label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            border-color: #ff5a96;
            outline: none;
        }
        .form-button {
            width: 100%;
            padding: 0.75rem;
            background-color: #ff5a96;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .form-button:hover {
            background-color: #ff4a86;
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-weight: bold;
        }
        .message.success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .message.error {
            background-color: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>

<div class="logo-container">
    <img id="logo-img" src="https://i.imgur.com/XamnfOc.png" alt="Logo">
    <span id="company-name">myshineapp</span>
</div>

<div class="container">
    <div class="card">
        <h2 class="title">Cadastro de Serviço de Técnico</h2>
        <p class="subtitle">Preencha os dados para registrar um novo serviço.</p>
        
        <form id="cadastroForm">
            <div class="mb-4">
                <label for="nome" class="form-label">Nome do Técnico</label>
                <select id="nome" name="nome" class="form-select" required>
                    <option value="">Carregando técnicos...</option>
                </select>
            </div>
            <div class="mb-4">
                <label for="email" class="form-label">Email do Técnico</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="mb-4">
                <label for="tipoServico" class="form-label">Tipo de Serviço</label>
                <select id="tipoServico" name="tipoServico" class="form-select" required>
                    <option value="">Selecione um tipo de serviço</option>
                    <option value="Manutenção">Manutenção</option>
                    <option value="Instalação">Instalação</option>
                    <option value="Reparo">Reparo</option>
                </select>
            </div>
            <button type="submit" class="form-button">Cadastrar Serviço</button>
            <div id="mensagem-cadastro" class="message hidden"></div>
        </form>
    </div>
</div>

<script>
    // Função para popular o dropdown de técnicos
    function popularDropdownTecnicos(tecnicos) {
        const select = document.getElementById('nome');
        select.innerHTML = '<option value="">Selecione um técnico</option>';
        tecnicos.forEach(tecnico => {
            const option = document.createElement('option');
            option.value = tecnico;
            option.textContent = tecnico;
            select.appendChild(option);
        });
    }

    // Carrega a lista de técnicos ao carregar a página
    window.onload = function() {
        google.script.run
            .withSuccessHandler(function(resposta) {
                if (resposta.success) {
                    popularDropdownTecnicos(resposta.tecnicos);
                } else {
                    alert(resposta.message);
                }
            })
            .getTecnicos();
    };

    document.getElementById('cadastroForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const form = event.target;
        const dadosServico = {
            nome: form.nome.value,
            email: form.email.value,
            tipoServico: form.tipoServico.value
        };

        const mensagemDiv = document.getElementById('mensagem-cadastro');
        mensagemDiv.classList.add('hidden');
        mensagemDiv.textContent = '';

        google.script.run
            .withSuccessHandler(function(resposta) {
                if (resposta.success) {
                    mensagemDiv.textContent = resposta.message;
                    mensagemDiv.classList.remove('hidden');
                    mensagemDiv.classList.remove('error');
                    mensagemDiv.classList.add('success');
                    form.reset();
                } else {
                    mensagemDiv.textContent = resposta.message;
                    mensagemDiv.classList.remove('hidden');
                    mensagemDiv.classList.remove('success');
                    mensagemDiv.classList.add('error');
                }
            })
            .withFailureHandler(function(erro) {
                mensagemDiv.textContent = `Erro no servidor: ${erro}`;
                mensagemDiv.classList.remove('hidden');
                mensagemDiv.classList.remove('success');
                mensagemDiv.classList.add('error');
            })
            .cadastrarServico(dadosServico);
    });
</script>
</body>
</html>
