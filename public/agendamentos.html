<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif';
            background-color: #f3f4f6; /* Cor de fundo do agendbackup */
            display: flex;
            min-height: 100vh;
        }
        .bg-primary {
            background-color: #ff5a96; /* Cor primária do agendbackup */
        }
        .text-primary {
            color: #ff5a96; /* Cor do texto primário do agendbackup */
        }
        .card {
            background-color: #ffffff;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            padding: 2.5rem;
        }
        .input-field {
            border-radius: 0.75rem;
            border: 1px solid #e0e0e0;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            outline: none;
            border-color: #ff5a96; /* Cor primária do agendbackup */
            box-shadow: 0 0 0 3px rgba(255, 90, 150, 0.4);
        }
        .btn-primary {
            background-color: #ff5a96; /* Cor primária do agendbackup */
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            box-shadow: 0 6px 20px rgba(255, 90, 150, 0.3);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #e54b8a; /* Cor do hover do agendbackup */
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 90, 150, 0.4);
        }
        .bg-secondary {
            background-color: #fbd572; /* Cor secundária do agendbackup */
        }
        .text-secondary {
            color: #fbd572; /* Cor secundária para texto */
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Sidebar -->
    <aside class="w-72 bg-white shadow-lg flex flex-col items-center py-8 border-r border-gray-200">
        <div class="flex flex-col items-center space-y-4 mb-10">
            <a href="#">
                <img class="h-48 w-auto" src="https://i.imgur.com/XamnfOc.png" alt="Logotype">
            </a>
        </div>
        <nav class="w-full px-4 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium bg-primary text-white shadow-sm" aria-current="page">
                Appointment Registration
            </a>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="container mx-auto">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-bold text-gray-800">Appointment Dashboard</h1>
                <div class="flex items-center space-x-4">
                    <button class="flex items-center px-4 py-2 bg-primary text-white rounded-lg shadow-md transition duration-300 ease-in-out hover:bg-opacity-80">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add New Appointment
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 gap-8">
                <!-- Main Form Card -->
                <div class="card">
                    <h2 class="text-xl font-bold text-primary mb-6">Register a New Appointment</h2>
                    
                    <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-2">

                        <!-- From Logistic -->
                        <div class="col-span-full">
                            <h3 class="text-lg font-semibold text-secondary mb-4">From Logistic</h3>
                        </div>
                        <div class="space-y-1">
                            <label for="type" class="block text-sm font-medium text-gray-700">Type</label>
                            <select id="type" name="type" required class="mt-1 block w-full input-field">
                                <option value="Central">Central</option>
                                <option value="Franchise">Franchion</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="data" class="block text-sm font-medium text-gray-700">Date</label>
                            <input type="date" id="data" name="data" required class="mt-1 block w-full input-field">
                        </div>
                        <div class="space-y-1">
                            <label for="appointmentDate" class="block text-sm font-medium text-gray-700">Appointment Date</label>
                            <input type="date" id="appointmentDate" name="appointmentDate" required class="mt-1 block w-full input-field">
                        </div>
                        <div class="space-y-1">
                            <label for="franchise" class="block text-sm font-medium text-gray-700">Franchise</label>
                            <input type="text" id="franchise" name="franchise" required class="mt-1 block w-full input-field">
                        </div>
                        <div class="space-y-1">
                            <label for="city" class="block text-sm font-medium text-gray-700">City</label>
                            <input type="text" id="city" name="city" required class="mt-1 block w-full input-field">
                        </div>
                        
                        <!-- From Schedule -->
                        <div class="col-span-full mt-6">
                            <h3 class="text-lg font-semibold text-secondary mb-4">From Schedule</h3>
                        </div>
                        <div class="space-y-1">
                            <label for="customers" class="block text-sm font-medium text-gray-700">Customers</label>
                            <input type="text" id="customers" name="customers" required class="mt-1 block w-full input-field">
                        </div>
                        <div class="space-y-1">
                            <label for="pets" class="block text-sm font-medium text-gray-700">Pets</label>
                            <select id="pets" name="pets" class="mt-1 block w-full input-field">
                                <option value="">Number of Pets</option>
                                <script>
                                    for (let i = 1; i <= 15; i++) {
                                        document.write(`<option value="${i}">${i}</option>`);
                                    }
                                </script>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
                            <input type="tel" id="phone" name="phone" required class="mt-1 block w-full input-field">
                        </div>
                        <div class="space-y-1">
                            <label for="oldNew" class="block text-sm font-medium text-gray-700">New/Old</label>
                            <select id="oldNew" name="oldNew" required class="mt-1 block w-full input-field">
                                <option value="New">New</option>
                                <option value="Old">Old</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="serviceValue" class="block text-sm font-medium text-gray-700">Service Value</label>
                            <input type="text" id="serviceValue" name="serviceValue" required class="mt-1 block w-full input-field">
                        </div>

                        <!-- From Closers -->
                        <div class="col-span-full mt-6">
                            <h3 class="text-lg font-semibold text-secondary mb-4">From Closers</h3>
                        </div>
                        <div class="space-y-1">
                            <label for="closer1" class="block text-sm font-medium text-gray-700">Salesperson (1)</label>
                            <select id="closer1" name="closer1" required class="mt-1 block w-full input-field">
                                <option value="">Select a salesperson</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="closer2" class="block text-sm font-medium text-gray-700">Salesperson (2)</label>
                            <select id="closer2" name="closer2" class="mt-1 block w-full input-field">
                                <option value="">Select a salesperson</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="week" class="block text-sm font-medium text-gray-700">Week</label>
                            <select id="week" name="week" class="mt-1 block w-full input-field">
                                <option value="">Select week</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="month" class="block text-sm font-medium text-gray-700">Month</label>
                            <select id="month" name="month" required class="mt-1 block w-full input-field">
                                <option value="">Select month</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
                            <select id="year" name="year" required class="mt-1 block w-full input-field">
                                <option value="">Select year</option>
                                <option value="2024">2024</option>
                                <option value="2025">2025</option>
                                <option value="2026">2026</option>
                                <option value="2027">2027</option>
                                <option value="2028">2028</option>
                                <option value="2029">2029</option>
                                <option value="2030">2030</option>
                                <option value="2031">2031</option>
                                <option value="2032">2032</option>
                                <option value="2033">2033</option>
                                <option value="2034">2034</option>
                                <option value="2035">2035</option>
                                <option value="2036">2036</option>
                                <option value="2037">2037</option>
                                <option value="2038">2038</option>
                                <option value="2039">2039</option>
                                <option value="2040">2040</option>
                            </select>
                        </div>
                        
                        <!-- From Lead -->
                        <div class="col-span-full mt-6">
                            <h3 class="text-lg font-semibold text-secondary mb-4">From Lead</h3>
                        </div>
                        <div class="space-y-1">
                            <label for="source" class="block text-sm font-medium text-gray-700">Source</label>
                            <select id="source" name="source" required class="mt-1 block w-full input-field">
                                <option value="">Select source</option>
                                <option value="Facebook">Facebook</option>
                                <option value="Kommo">Kommo</option>
                                <option value="Social Traffic">Social Traffic</option>
                                <option value="SMS">SMS</option>
                                <option value="Call">Call</option>
                                <option value="Friends">Friends</option>
                                <option value="Family Member">Family Member</option>
                                <option value="Neighbors">Neighbors</option>
                                <option value="Reminder">Reminder</option>
                                <option value="Email">Email</option>
                                <option value="Google">Google</option>
                                <option value="Website">Website</option>
                                <option value="Grooming / Referral P">Grooming / Referral P</option>
                                <option value="Instagram">Instagram</option>
                                <option value="Technician">Technician</option>
                                <option value="WhatsApp">WhatsApp</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        
                        <div class="col-span-full">
                            <div id="messageArea" class="mt-6 text-center text-sm font-medium"></div>
                        </div>

                        <div class="col-span-full">
                           <!-- Container for Confirmation Code and Reminder Date -->
                            <div class="flex flex-col md:flex-row gap-6 mt-8">
                                <div class="card flex-1 flex flex-col items-center">
                                    <h3 class="text-lg font-semibold text-secondary mb-4">Confirmation Code</h3>
                                    <div id="codePassDisplay" class="h-20 w-full bg-secondary rounded-xl flex items-center justify-center font-bold text-3xl text-white shadow-md"></div>
                                </div>
                                <div class="card flex-1 flex flex-col items-center">
                                    <h3 class="text-lg font-semibold text-secondary mb-4">Reminder Date</h3>
                                    <div id="reminderDateDisplay" class="h-20 w-full bg-secondary rounded-xl flex items-center justify-center font-bold text-3xl text-white shadow-md"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- New Submit Button -->
                        <div class="col-span-full flex justify-center mt-6">
                            <button type="submit"
                                    class="w-full flex justify-center py-4 px-6 border border-transparent btn-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                                Register Appointment
                            </button>
                        </div>
                        
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // Helper function to format a date object to MM/DD/YYYY string
        function formatDateToMMDDYYYY(dateObj) {
            const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const day = dateObj.getDate().toString().padStart(2, '0');
            const year = dateObj.getFullYear();
            return `${month}/${day}/${year}`;
        }
    
        document.getElementById('scheduleForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const form = event.target;
            const messageArea = document.getElementById('messageArea');
            const codePassInput = document.getElementById('codePass');
            const reminderDateInput = document.getElementById('reminderDate');

            // Show processing message
            messageArea.textContent = 'Processing...';
            messageArea.className = 'mt-6 text-center text-sm font-medium text-gray-500';

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            // Estruturar os dados para envio para a API
            const formattedData = {
                type: data.type,
                data: data.data,
                pets: data.pets,
                closer1: data.closer1,
                closer2: data.closer2,
                customers: data.customers,
                phone: data.phone,
                oldNew: data.oldNew,
                appointmentDate: data.appointmentDate,
                serviceValue: data.serviceValue,
                franchise: data.franchise,
                city: data.city,
                source: data.source,
                week: data.week,
                month: data.month,
                year: data.year,
                // Os campos 'Value' e 'Code' foram removidos do formulário,
                // mas a API precisa deles. Vamos enviar valores vazios.
                value: '', 
                code: codePassInput.value,
                reminderDate: reminderDateInput.value
            };

            // Enviando para a API no servidor
            try {
                const response = await fetch('/api/register-appointment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formattedData),
                });
                
                const result = await response.json();

                if (result.success) {
                    messageArea.textContent = result.message;
                    messageArea.className = 'mt-6 text-center text-sm font-medium text-green-600';
                    form.reset(); // Limpa o formulário
                } else {
                    messageArea.textContent = result.message;
                    messageArea.className = 'mt-6 text-center text-sm font-medium text-red-600';
                }
            } catch (error) {
                console.error('Erro ao registrar agendamento:', error);
                messageArea.textContent = 'A network error occurred. Please try again.';
                messageArea.className = 'mt-6 text-center text-sm font-medium text-red-600';
            }
        });

        // Script para pré-selecionar o mês e o ano atuais e carregar os Closers
        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date();
            const currentMonth = today.getMonth() + 1; // getMonth() retorna de 0-11
            const currentYear = today.getFullYear();
            const currentDate = today.toISOString().slice(0, 10);
            
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const dateInput = document.getElementById('data');
            const customersInput = document.getElementById('customers');
            const codePassDisplay = document.getElementById('codePassDisplay');
            const closer1Select = document.getElementById('closer1');
            const closer2Select = document.getElementById('closer2');
            const appointmentDateInput = document.getElementById('appointmentDate');
            const reminderDateDisplay = document.getElementById('reminderDateDisplay');
            
            const codePassInput = document.createElement('input');
            codePassInput.type = 'hidden';
            codePassInput.id = 'codePass';
            codePassInput.name = 'codePass';
            document.getElementById('scheduleForm').appendChild(codePassInput);

            const reminderDateInput = document.createElement('input');
            reminderDateInput.type = 'hidden';
            reminderDateInput.id = 'reminderDate';
            reminderDateInput.name = 'reminderDate';
            document.getElementById('scheduleForm').appendChild(reminderDateInput);


            if (monthSelect) {
                monthSelect.value = currentMonth.toString();
            }
            if (yearSelect) {
                yearSelect.value = currentYear.toString();
            }
            if (dateInput) {
                // For input type="date", setting the value as YYYY-MM-DD is the standard. 
                // The visual format is determined by the user's browser settings.
                dateInput.value = currentDate;
            }

            // Listener para gerar a data de lembrete
            appointmentDateInput.addEventListener('input', (event) => {
                const appointmentDateValue = event.target.value;
                if (appointmentDateValue) {
                    const appointmentDate = new Date(appointmentDateValue);
                    appointmentDate.setMonth(appointmentDate.getMonth() + 5);
                    
                    // Format the date for display
                    const displayDate = formatDateToMMDDYYYY(appointmentDate);
                    reminderDateDisplay.textContent = displayDate;

                    // Keep the value in YYYY-MM-DD format for the backend API
                    const apiDate = appointmentDate.toISOString().split('T')[0];
                    reminderDateInput.value = apiDate;
                } else {
                    reminderDateDisplay.textContent = '';
                    reminderDateInput.value = '';
                }
            });

            // Carregar os Closers via API
            try {
                const response = await fetch('/api/get-employees');
                if (!response.ok) {
                    throw new Error('Error loading Salespersons data.');
                }
                const employees = await response.json();
                
                if (employees && Array.isArray(employees)) {
                    employees.forEach(employee => {
                        if (employee) {
                            const option1 = document.createElement('option');
                            option1.value = employee;
                            option1.textContent = employee;
                            closer1Select.appendChild(option1);

                            const option2 = document.createElement('option');
                            option2.value = employee;
                            option2.textContent = employee;
                            closer2Select.appendChild(option2);
                        }
                    });
                }
            } catch (error) {
                console.error('Error populating Salespersons:', error);
            }

            customersInput.addEventListener('input', () => {
                const value = customersInput.value.trim();
                if (value.length > 0) {
                    const randomNumber = Math.floor(Math.random() * 10000);
                    const paddedNumber = randomNumber.toString().padStart(4, '0');
                    codePassDisplay.textContent = paddedNumber;
                    codePassInput.value = paddedNumber;
                } else {
                    codePassDisplay.textContent = '';
                    codePassInput.value = '';
                }
            });
        });
    </script>

</body>
</html>
