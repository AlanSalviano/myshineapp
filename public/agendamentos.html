<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Agendamentos</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fef4f6 0%, #ffeaf1 100%);
            display: flex;
            min-height: 100vh;
        }
        .bg-primary {
            background-color: #ff5a96;
        }
        .bg-primary-dark {
            background-color: #e54b8a;
        }
        .bg-secondary {
            background-color: #fbd572;
        }
        .text-primary {
            color: #ff5a96;
        }
        .form-card {
            background-color: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            padding: 2.5rem;
        }
        .input-field {
            border-radius: 1rem;
            border: 1px solid #e0e0e0;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
        }
        .input-field:focus {
            outline: none;
            border-color: #ff5a96;
            box-shadow: 0 0 0 3px rgba(255, 90, 150, 0.4), inset 0 1px 3px rgba(0,0,0,0.06);
        }
        .btn-primary {
            background: linear-gradient(45deg, #ff5a96, #e54b8a);
            color: #fff;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            box-shadow: 0 6px 20px rgba(255, 90, 150, 0.4);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 90, 150, 0.5);
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Sidebar -->
    <aside class="w-72 bg-[#fbfbfb] shadow-lg flex flex-col items-center py-8 border-r border-gray-200">
        <div class="flex flex-col items-center space-y-4 mb-10">
            <a href="#">
                <img class="h-48 w-auto" src="https://i.imgur.com/XamnfOc.png" alt="Logotipo">
            </a>
        </div>
        <nav class="w-full px-4 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 rounded-xl text-sm font-medium bg-primary text-white shadow-sm" aria-current="page">
                Registro de Agendamento
            </a>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="container mx-auto form-card">
            <h1 class="mt-4 text-3xl font-bold text-center text-primary mb-2">Registro de Agendamentos</h1>
            <p class="text-center text-gray-500 mb-8">Por favor, preencha os campos abaixo para registrar um novo agendamento.</p>

            <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Linha 1 -->
                <div class="space-y-1">
                    <label for="type" class="block text-sm font-medium text-gray-700">Tipo</label>
                    <select id="type" name="type" required class="mt-1 block w-full input-field">
                        <option value="Central">Central</option>
                        <option value="Franchise">Franquia</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="data" class="block text-sm font-medium text-gray-700">Data</label>
                    <input type="date" id="data" name="data" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="pets" class="block text-sm font-medium text-gray-700">Pets</label>
                    <select id="pets" name="pets" class="mt-1 block w-full input-field">
                        <option value="">Nº de Pets</option>
                        <script>
                            for (let i = 1; i <= 15; i++) {
                                document.write(`<option value="${i}">${i}</option>`);
                            }
                        </script>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="closer1" class="block text-sm font-medium text-gray-700">Vendedor (1)</label>
                    <select id="closer1" name="closer1" required class="mt-1 block w-full input-field">
                        <option value="">Selecione um vendedor</option>
                    </select>
                </div>

                <!-- Linha 2 -->
                <div class="space-y-1">
                    <label for="closer2" class="block text-sm font-medium text-gray-700">Vendedor (2)</label>
                    <select id="closer2" name="closer2" class="mt-1 block w-full input-field">
                        <option value="">Selecione um vendedor</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="customers" class="block text-sm font-medium text-gray-700">Clientes</label>
                    <input type="text" id="customers" name="customers" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="phone" class="block text-sm font-medium text-gray-700">Telefone</label>
                    <input type="tel" id="phone" name="phone" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="oldNew" class="block text-sm font-medium text-gray-700">Novo/Antigo</label>
                    <select id="oldNew" name="oldNew" required class="mt-1 block w-full input-field">
                        <option value="New">Novo</option>
                        <option value="Old">Antigo</option>
                    </select>
                </div>
                
                <!-- Linha 3 -->
                <div class="space-y-1">
                    <label for="appointmentDate" class="block text-sm font-medium text-gray-700">Data (Agendamento)</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="serviceValue" class="block text-sm font-medium text-gray-700">Valor do Serviço</label>
                    <input type="text" id="serviceValue" name="serviceValue" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="franchise" class="block text-sm font-medium text-gray-700">Franquia</label>
                    <input type="text" id="franchise" name="franchise" required class="mt-1 block w-full input-field">
                </div>
                <div class="space-y-1">
                    <label for="city" class="block text-sm font-medium text-gray-700">Cidade</label>
                    <input type="text" id="city" name="city" required class="mt-1 block w-full input-field">
                </div>
                
                <!-- Linha 4 -->
                <div class="space-y-1">
                    <label for="source" class="block text-sm font-medium text-gray-700">Origem</label>
                    <select id="source" name="source" required class="mt-1 block w-full input-field">
                        <option value="">Selecione a origem</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Kommo">Kommo</option>
                        <option value="Social Traffic">Tráfego Social</option>
                        <option value="SMS">SMS</option>
                        <option value="Call">Chamada</option>
                        <option value="Friends">Amigos</option>
                        <option value="Family Member">Membro da Família</option>
                        <option value="Neighbors">Vizinhos</option>
                        <option value="Reminder">Lembrete</option>
                        <option value="Email">Email</option>
                        <option value="Google">Google</option>
                        <option value="Website">Site</option>
                        <option value="Grooming / Referral P">Grooming / Indicação P</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Technician">Técnico</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Other">Outro</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="week" class="block text-sm font-medium text-gray-700">Semana</label>
                    <select id="week" name="week" class="mt-1 block w-full input-field">
                        <option value="">Selecione a semana</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="month" class="block text-sm font-medium text-gray-700">Mês</label>
                    <select id="month" name="month" required class="mt-1 block w-full input-field">
                        <option value="">Selecione o mês</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10">10</option>
                        <option value="11">11</option>
                        <option value="12">12</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="year" class="block text-sm font-medium text-gray-700">Ano</label>
                    <select id="year" name="year" required class="mt-1 block w-full input-field">
                        <option value="">Selecione o ano</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                        <option value="2031">2031</option>
                        <option value="2032">2032</option>
                        <option value="2033">2033</option>
                        <option value="2034">2034</option>
                        <option value="2035">2035</option>
                        <option value="2036">2036</option>
                        <option value="2037">2037</option>
                        <option value="2038">2038</option>
                        <option value="2039">2039</option>
                        <option value="2040">2040</option>
                    </select>
                </div>
                
            </form>

            <div class="mt-8 flex items-end justify-end space-x-4">
                <!-- New Code Box and Subtitle -->
                <div class="flex flex-col items-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">Código de Confirmação</p>
                    <div id="codePassDisplay" class="h-10 w-32 bg-secondary rounded-xl shadow-sm flex items-center justify-center font-bold text-lg text-white"></div>
                </div>
                
                <!-- Register Appointment Button -->
                <button type="submit" form="scheduleForm"
                        class="w-full md:w-auto flex justify-center py-2 px-6 border border-transparent btn-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                    Registrar Agendamento
                </button>
            </div>

            <div id="messageArea" class="mt-6 text-center text-sm font-medium"></div>
        </div>
    </main>
    
    <script>
        document.getElementById('scheduleForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const form = event.target;
            const messageArea = document.getElementById('messageArea');
            const codePassInput = document.getElementById('codePass');

            // Show processing message
            messageArea.textContent = 'Processando...';
            messageArea.className = 'mt-6 text-center text-sm font-medium text-gray-500';

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            // Estruturar os dados para envio para a API
            const formattedData = {
                type: data.type,
                data: data.data,
                pets: data.pets,
                closer1: data.closer1,
                closer2: data.closer2,
                customers: data.customers,
                phone: data.phone,
                oldNew: data.oldNew,
                appointmentDate: data.appointmentDate,
                serviceValue: data.serviceValue,
                franchise: data.franchise,
                city: data.city,
                source: data.source,
                week: data.week,
                month: data.month,
                year: data.year,
                // Os campos 'Value' e 'Code' foram removidos do formulário,
                // mas a API precisa deles. Vamos enviar valores vazios.
                value: '', 
                code: codePassInput.value
            };

            // Enviando para a API no servidor
            try {
                const response = await fetch('/api/register-appointment', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formattedData),
                });
                
                const result = await response.json();

                if (result.success) {
                    messageArea.textContent = result.message;
                    messageArea.className = 'mt-6 text-center text-sm font-medium text-green-600';
                    form.reset(); // Limpa o formulário
                } else {
                    messageArea.textContent = result.message;
                    messageArea.className = 'mt-6 text-center text-sm font-medium text-red-600';
                }
            } catch (error) {
                console.error('Erro ao registrar agendamento:', error);
                messageArea.textContent = 'Ocorreu um erro de rede. Por favor, tente novamente.';
                messageArea.className = 'mt-6 text-center text-sm font-medium text-red-600';
            }
        });

        // Script para pré-selecionar o mês e o ano atuais e carregar os Closers
        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date();
            const currentMonth = today.getMonth() + 1; // getMonth() retorna de 0-11
            const currentYear = today.getFullYear();
            const currentDate = today.toISOString().slice(0, 10);
            
            const monthSelect = document.getElementById('month');
            const yearSelect = document.getElementById('year');
            const dateInput = document.getElementById('data');
            const customersInput = document.getElementById('customers');
            const codePassDisplay = document.getElementById('codePassDisplay');
            const closer1Select = document.getElementById('closer1');
            const closer2Select = document.getElementById('closer2');
            
            const codePassInput = document.createElement('input');
            codePassInput.type = 'hidden';
            codePassInput.id = 'codePass';
            codePassInput.name = 'codePass';
            document.getElementById('scheduleForm').appendChild(codePassInput);

            if (monthSelect) {
                monthSelect.value = currentMonth.toString();
            }
            if (yearSelect) {
                yearSelect.value = currentYear.toString();
            }
            if (dateInput) {
                dateInput.value = currentDate;
            }

            // Carregar os Closers via API
            try {
                const response = await fetch('/api/get-employees');
                if (!response.ok) {
                    throw new Error('Erro ao carregar os dados dos Vendedores.');
                }
                const employees = await response.json();
                
                if (employees && Array.isArray(employees)) {
                    employees.forEach(employee => {
                        if (employee) {
                            const option1 = document.createElement('option');
                            option1.value = employee;
                            option1.textContent = employee;
                            closer1Select.appendChild(option1);

                            const option2 = document.createElement('option');
                            option2.value = employee;
                            option2.textContent = employee;
                            closer2Select.appendChild(option2);
                        }
                    });
                }
            } catch (error) {
                console.error('Erro ao popular Vendedores:', error);
            }

            customersInput.addEventListener('input', () => {
                const value = customersInput.value.trim();
                if (value.length > 0) {
                    const randomNumber = Math.floor(Math.random() * 10000);
                    const paddedNumber = randomNumber.toString().padStart(4, '0');
                    codePassDisplay.textContent = paddedNumber;
                    codePassInput.value = paddedNumber;
                } else {
                    codePassDisplay.textContent = '';
                    codePassInput.value = '';
                }
            });
        });
    </script>

</body>
</html>
