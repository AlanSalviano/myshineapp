<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            min-height: 100vh;
        }
        .bg-primary {
            background-color: #ff5a96;
        }
        .bg-primary-dark {
            background-color: #e54b8a;
        }
        .bg-secondary {
            background-color: #fbd572;
        }
        .text-primary {
            color: #ff5a96;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- Sidebar -->
    <aside class="w-72 bg-[#fbfbfb] shadow-lg flex flex-col items-center py-8 border-r border-gray-200">
        <div class="flex flex-col items-center space-y-4 mb-10">
            <a href="#">
                <img class="h-48 w-auto" src="https://i.imgur.com/XamnfOc.png" alt="Logotipo">
            </a>
        </div>
        <nav class="w-full px-4 space-y-2">
            <a href="#" class="flex items-center px-4 py-3 rounded-md text-sm font-medium bg-primary text-white shadow-sm" aria-current="page">
                Appointment Registration
            </a>
        </nav>
    </aside>

    <!-- Main content -->
    <main class="flex-1 p-8 overflow-y-auto">
        <div class="container mx-auto p-8 bg-white rounded-lg shadow-xl">
            <h1 class="mt-4 text-3xl font-bold text-center text-primary mb-2">Appointment Registration</h1>
            <p class="text-center text-gray-500 mb-8">Please fill in the fields below to register a new appointment.</p>

            <form id="scheduleForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <!-- Row 1 -->
                <div class="space-y-1">
                    <label for="type" class="block text-sm font-medium text-gray-700">Type</label>
                    <select id="type" name="type" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="Central">Central</option>
                        <option value="Franchise">Franchise</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="data" class="block text-sm font-medium text-gray-700">Date</label>
                    <input type="date" id="data" name="data" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="pets" class="block text-sm font-medium text-gray-700">Pets</label>
                    <select id="pets" name="pets" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="">Pets Number</option>
                        <script>
                            for (let i = 1; i <= 15; i++) {
                                document.write(`<option value="${i}">${i}</option>`);
                            }
                        </script>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="closer1" class="block text-sm font-medium text-gray-700">Closer (1)</label>
                    <input type="text" id="closer1" name="closer1" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>

                <!-- Row 2 -->
                <div class="space-y-1">
                    <label for="closer2" class="block text-sm font-medium text-gray-700">Closer (2)</label>
                    <input type="text" id="closer2" name="closer2" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="customers" class="block text-sm font-medium text-gray-700">Customers</label>
                    <input type="text" id="customers" name="customers" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="phone" class="block text-sm font-medium text-gray-700">Phone</label>
                    <input type="tel" id="phone" name="phone" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="oldNew" class="block text-sm font-medium text-gray-700">Old/New</label>
                    <select id="oldNew" name="oldNew" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="New">New</option>
                        <option value="Old">Old</option>
                    </select>
                </div>
                
                <!-- Row 3 -->
                <div class="space-y-1">
                    <label for="appointmentDate" class="block text-sm font-medium text-gray-700">Date (Appointment)</label>
                    <input type="date" id="appointmentDate" name="appointmentDate" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="serviceValue" class="block text-sm font-medium text-gray-700">Service Value</label>
                    <input type="text" id="serviceValue" name="serviceValue" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="franchise" class="block text-sm font-medium text-gray-700">Franchise</label>
                    <input type="text" id="franchise" name="franchise" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                <div class="space-y-1">
                    <label for="city" class="block text-sm font-medium text-gray-700">City</label>
                    <input type="text" id="city" name="city" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                </div>
                
                <!-- Row 4 -->
                <div class="space-y-1">
                    <label for="source" class="block text-sm font-medium text-gray-700">Source</label>
                    <select id="source" name="source" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="">Select source</option>
                        <option value="Facebook">Facebook</option>
                        <option value="Kommo">Kommo</option>
                        <option value="Social Traffic">Social Traffic</option>
                        <option value="SMS">SMS</option>
                        <option value="Call">Call</option>
                        <option value="Friends">Friends</option>
                        <option value="Family Member">Family Member</option>
                        <option value="Neighbors">Neighbors</option>
                        <option value="Reminder">Reminder</option>
                        <option value="Email">Email</option>
                        <option value="Google">Google</option>
                        <option value="Website">Website</option>
                        <option value="Grooming / Referral P">Grooming / Referral P</option>
                        <option value="Instagram">Instagram</option>
                        <option value="Technician">Technician</option>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="week" class="block text-sm font-medium text-gray-700">Week</label>
                    <select id="week" name="week" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="">Select week</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="month" class="block text-sm font-medium text-gray-700">Month</label>
                    <select id="month" name="month" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="">Select month</option>
                        <option value="1">January</option>
                        <option value="2">February</option>
                        <option value="3">March</option>
                        <option value="4">April</option>
                        <option value="5">May</option>
                        <option value="6">June</option>
                        <option value="7">July</option>
                        <option value="8">August</option>
                        <option value="9">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label for="year" class="block text-sm font-medium text-gray-700">Year</label>
                    <select id="year" name="year" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                        <option value="">Select year</option>
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                        <option value="2027">2027</option>
                        <option value="2028">2028</option>
                        <option value="2029">2029</option>
                        <option value="2030">2030</option>
                        <option value="2031">2031</option>
                        <option value="2032">2032</option>
                        <option value="2033">2033</option>
                        <option value="2034">2034</option>
                        <option value="2035">2035</option>
                        <option value="2036">2036</option>
                        <option value="2037">2037</option>
                        <option value="2038">2038</option>
                        <option value="2039">2039</option>
                        <option value="2040">2040</option>
                    </select>
                </div>
                
            </form>

            <div class="mt-8 flex items-end justify-end space-x-4">
                <!-- New Code Box and Subtitle -->
                <div class="flex flex-col items-center">
                    <p class="text-xs font-bold text-gray-500 mb-1">Code Pass</p>
                    <div class="h-10 w-32 bg-secondary rounded-md shadow-sm"></div>
                </div>
                
                <!-- Register Appointment Button -->
                <button type="submit" form="scheduleForm"
                        class="w-full md:w-auto flex justify-center py-2 px-6 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-dark focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-light transition duration-300 ease-in-out">
                    Register Appointment
                </button>
            </div>

            <div id="messageArea" class="mt-6 text-center text-sm font-medium"></div>
        </div>
    </main>
    
    <script>
        document.getElementById('scheduleForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const form = event.target;
            const messageArea = document.getElementById('messageArea');

            // Show processing message
            messageArea.textContent = 'Processing...';
            messageArea.className = 'mt-6 text-center text-sm font-medium text-gray-500';

            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                data[key] = value;
            });

            // Structure data for sending (assuming API accepts this format)
            const formattedData = {
                type: data.type,
                data: data.data,
                pets: data.pets,
                closer1: data.closer1,
                closer2: data.closer2,
                customers: data.customers,
                phone: data.phone,
                oldNew: data.oldNew,
                appointmentDate: data.appointmentDate,
                serviceValue: data.serviceValue,
                franchise: data.franchise,
                city: data.city,
                source: data.source,
                week: data.week,
                month: data.month,
                year: data.year,
            };

            // Simulating sending to an API (here you would put the real endpoint)
            try {
                // await fetch('/api/appointment-endpoint', {
                //     method: 'POST',
                //     headers: {
                //         'Content-Type': 'application/json',
                //     },
                //     body: JSON.stringify(formattedData),
                // });

                // If sending is successful
                messageArea.textContent = 'Appointment successfully registered!';
                messageArea.className = 'mt-6 text-center text-sm font-medium text-green-600';
                form.reset(); // Clear the form
            } catch (error) {
                // In case of error
                console.error('Error registering appointment:', error);
                messageArea.textContent = 'Error registering appointment. Please try again.';
                messageArea.className = 'mt-6 text-center text-sm font-medium text-red-600';
            }
        });
    </script>

</body>
</html>
